<HTML>
<HEAD>
<META CHARSET="UTF-8">
<TITLE>Regístrate - INKAEDU.PE</TITLE>
<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
<STYLE>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
BODY{
    font-family:Arial, sans-serif;
    background:
    radial-gradient(circle at top left, rgba(255,215,0,0.18), transparent 25%),
    radial-gradient(circle at bottom right, rgba(0,0,119,0.12), transparent 30%),
    linear-gradient(to right,#F6F2EB,#F6F2EB);
    min-height:100vh;
}
.header{
    background:#0D1B36;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 30px;
    box-shadow:0 4px 15px rgba(0,0,0,0.25);
}
.logo{
    font-size:38px;
    font-weight:bold;
    letter-spacing:3px;
    color:white;
    font-family:"Lobster",cursive;
}
.logo span{
    color:#1F6A67;
}
.menu{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:flex-end;
}
.menu button{
    border:none;
    border-radius:25px;
    padding:10px 15px;
    background:white;
    cursor:pointer;
    transition:0.3s;
}
.menu button:hover{
    background:#F6F2EB;
    transform:translateY(-3px);
}
.menu a{
    text-decoration:none;
    color:#0D1B36;
    font-weight:bold;
}
.menu .registrate{
    background:#D7B06D;
}
/* TARJETA DE REGISTRO */
.registro-wrap{
    max-width:480px;
    margin:55px auto 0;
    padding:0 25px;
}
.tarjeta-registro{
    background:white;
    border-radius:22px;
    padding:42px 38px;
    box-shadow:0 8px 30px rgba(0,0,0,0.12);
}
.tarjeta-registro h1{
    color:#1F6A67;
    font-size:34px;
    font-family:"Cooper Black";
    text-align:center;
}
.linea-c{
    width:120px;
    height:5px;
    background:#D7B06D;
    border-radius:10px;
    margin:14px auto 16px;
}
.tarjeta-registro .sub{
    text-align:center;
    color:#555;
    font-size:16px;
    margin-bottom:28px;
}
.form-registro label{
    display:block;
    color:#0D1B36;
    font-weight:bold;
    margin-bottom:6px;
}
.form-registro input,
.form-registro select{
    width:100%;
    padding:12px 14px;
    border:1px solid #d8d2c4;
    border-radius:10px;
    font-family:Arial, sans-serif;
    font-size:16px;
    margin-bottom:18px;
    background:#fdfcf9;
}
.form-registro input:focus,
.form-registro select:focus{
    outline:2px solid #1F6A67;
    border-color:#1F6A67;
}
.btn-registro{
    width:100%;
    background:#0D1B36;
    color:white;
    border:none;
    padding:14px;
    border-radius:25px;
    font-weight:bold;
    font-size:17px;
    cursor:pointer;
    transition:0.3s;
    margin-top:6px;
}
.btn-registro:hover{
    background:#D7B06D;
    color:#0D1B36;
}
.login-link{
    text-align:center;
    margin-top:22px;
    color:#555;
    font-size:15px;
}
.login-link a{
    color:#1F6A67;
    font-weight:bold;
    text-decoration:none;
}
.login-link a:hover{
    text-decoration:underline;
}
.pie{
    margin-top:60px;
}
</STYLE>
</HEAD>
<BODY>
<DIV CLASS="header">
<DIV CLASS="logo">
Inka<span>edu</span>
</DIV>
<DIV CLASS="menu">
<BUTTON><A HREF="INICIO.HTML">INICIO</A></BUTTON>
<BUTTON><A HREF="MATERIAS.HTML">MATERIAS</A></BUTTON>
<BUTTON><A HREF="RECURSOS.HTML">RECURSOS</A></BUTTON>
<BUTTON><A HREF="CONTACTO.HTML">CONTACTO</A></BUTTON>
<BUTTON CLASS="registrate"><A HREF="REGISTRATE.HTML">REGÍSTRATE</A></BUTTON>
</DIV>
</DIV>

<DIV CLASS="registro-wrap">
<DIV CLASS="tarjeta-registro">
<H1>Crea tu cuenta</H1>
<DIV CLASS="linea-c"></DIV>
<P CLASS="sub">Únete gratis a INKAEDU.PE y empieza a estudiar</P>

<FORM CLASS="form-registro" ACTION="#" METHOD="post">
<LABEL>Nombre completo</LABEL>
<INPUT TYPE="text" NAME="nombre" placeholder="Escribe tu nombre" required>

<LABEL>Correo electrónico</LABEL>
<INPUT TYPE="email" NAME="correo" placeholder="tucorreo@ejemplo.com" required>

<LABEL>Grado</LABEL>
<SELECT NAME="grado" required>
<OPTION value="">Selecciona tu grado</OPTION>
<OPTION>1ro de secundaria</OPTION>
<OPTION>2do de secundaria</OPTION>
<OPTION>3ro de secundaria</OPTION>
<OPTION>4to de secundaria</OPTION>
<OPTION>5to de secundaria</OPTION>
<OPTION>Preuniversitario / Egresado</OPTION>
</SELECT>

<LABEL>Contraseña</LABEL>
<INPUT TYPE="password" NAME="clave" placeholder="Crea una contraseña" required>

<LABEL>Confirmar contraseña</LABEL>
<INPUT TYPE="password" NAME="clave2" placeholder="Repite tu contraseña" required>

<BUTTON TYPE="submit" CLASS="btn-registro">Crear cuenta</BUTTON>
</FORM>

<P CLASS="login-link">¿Ya tienes cuenta? <A HREF="LOGIN.HTML">Inicia sesión</A></P>
</DIV>
</DIV>

<DIV CLASS="pie">
<HR>
<CENTER>
<FONT face="Comic Sans MS" size="3" color="#1A237E">INKAEDU.PE - Aprendemos juntos, crecemos juntos.</FONT>
</CENTER>
</DIV>

</BODY>
</HTML>
