<HTML>
<HEAD>
<META CHARSET="UTF-8">
<TITLE>Contacto - INKAEDU.PE</TITLE>
<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
<STYLE>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
BODY{
    font-family:Arial, sans-serif;
    background:
    radial-gradient(circle at top left, rgba(255,215,0,0.18), transparent 25%),
    radial-gradient(circle at bottom right, rgba(0,0,119,0.12), transparent 30%),
    linear-gradient(to right,#F6F2EB,#F6F2EB);
    min-height:100vh;
}
.header{
    background:#0D1B36;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 30px;
    box-shadow:0 4px 15px rgba(0,0,0,0.25);
}
.logo{
    font-size:38px;
    font-weight:bold;
    letter-spacing:3px;
    color:white;
    font-family:"Lobster",cursive;
}
.logo span{
    color:#1F6A67;
}
.menu{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:flex-end;
}
.menu button{
    border:none;
    border-radius:25px;
    padding:10px 15px;
    background:white;
    cursor:pointer;
    transition:0.3s;
}
.menu button:hover{
    background:#F6F2EB;
    transform:translateY(-3px);
}
.menu a{
    text-decoration:none;
    color:#0D1B36;
    font-weight:bold;
}
.menu .registrate{
    background:#D7B06D;
}
.titulo-pagina{
    text-align:center;
    margin-top:50px;
}
.titulo-pagina h1{
    color:#1F6A67;
    font-size:48px;
    font-family:"Cooper Black";
}
.titulo-pagina p{
    color:#555;
    font-size:18px;
    margin-top:10px;
}
.linea-c{
    width:150px;
    height:5px;
    background:#D7B06D;
    border-radius:10px;
    margin:18px auto 0;
}
/* CONTENIDO DE CONTACTO */
.contacto-wrap{
    display:flex;
    flex-wrap:wrap;
    gap:30px;
    max-width:1000px;
    margin:45px auto 0;
    padding:0 40px;
}
.col-contacto{
    flex:1;
    min-width:300px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}
.col-contacto h2{
    color:#1F6A67;
    font-size:26px;
    margin-bottom:22px;
}
/* DATOS */
.dato{
    margin-bottom:20px;
}
.dato .et{
    display:block;
    color:#0D1B36;
    font-weight:bold;
    margin-bottom:3px;
}
.dato .val{
    color:#444;
    font-size:17px;
}
.redes a{
    display:inline-block;
    background:#0D1B36;
    color:white;
    padding:9px 18px;
    border-radius:20px;
    text-decoration:none;
    margin:5px 8px 5px 0;
    font-weight:bold;
    transition:0.3s;
}
.redes a:hover{
    background:#D7B06D;
    color:#0D1B36;
}
/* FORMULARIO */
.form-contacto label{
    display:block;
    color:#0D1B36;
    font-weight:bold;
    margin-bottom:6px;
}
.form-contacto input,
.form-contacto textarea{
    width:100%;
    padding:12px 14px;
    border:1px solid #d8d2c4;
    border-radius:10px;
    font-family:Arial, sans-serif;
    font-size:16px;
    margin-bottom:18px;
    background:#fdfcf9;
}
.form-contacto input:focus,
.form-contacto textarea:focus{
    outline:2px solid #1F6A67;
    border-color:#1F6A67;
}
.form-contacto textarea{
    min-height:130px;
    resize:vertical;
}
.btn-enviar{
    background:#0D1B36;
    color:white;
    border:none;
    padding:13px 32px;
    border-radius:25px;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}
.btn-enviar:hover{
    background:#D7B06D;
    color:#0D1B36;
}
.pie{
    margin-top:60px;
}
</STYLE>
</HEAD>
<BODY>
<DIV CLASS="header">
<DIV CLASS="logo">
Inka<span>edu</span>
</DIV>
<DIV CLASS="menu">
